<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flow tour — Yard Flow</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body class="prezi-page">
  <header class="topbar prezi-topbar">
    <h1 data-ui="preziPageTitle"></h1>
    <nav class="pills">
      <a href="index.html" data-ui="navStart">Start</a>
      <a href="story.html" data-ui="navStory">Cargo story</a>
      <a href="roles.html" data-ui="navRoles">By role</a>
      <a href="glossary.html" data-ui="navGlossary">Glossary</a>
      <a href="models.html" data-ui="navModels">Domain model</a>
      <a href="prezi.html" class="active" data-ui="navPrezi">Flow tour</a>
    </nav>
    <div class="lang-switch" role="group" aria-label="Language">
      <button type="button" data-lang-btn="en">EN</button>
      <button type="button" data-lang-btn="fa">فا</button>
    </div>
  </header>

  <div class="prezi-stage">
    <div id="prezi-viewport" class="prezi-viewport" tabindex="0">
      <div id="prezi-canvas" class="prezi-canvas"></div>
    </div>

    <div class="prezi-hud">
      <div class="prezi-hud-controls">
        <button type="button" id="prezi-prev" class="prezi-btn"></button>
        <span id="prezi-step" class="prezi-step"></span>
        <button type="button" id="prezi-next" class="prezi-btn prezi-btn-primary"></button>
        <button type="button" id="prezi-overview" class="prezi-btn"></button>
        <a id="prezi-chapter-link" class="prezi-chapter-link is-unavailable" href="story.html"></a>
      </div>
    </div>
    <p id="prezi-hint" class="prezi-hint"></p>
  </div>

  <script src="shared/data.js"></script>
  <script src="shared/app.js"></script>
  <script src="shared/prezi.js"></script>
  <script>
    (function () {
      var Y = YardStory;
      Y.initLangToggle();
      function paint() {
        document.querySelectorAll("[data-ui]").forEach(function (el) {
          el.textContent = Y.ui(el.getAttribute("data-ui"));
        });
        document.title =
          Y.getLang() === "fa"
            ? "تور جریان — Yard Flow"
            : "Flow tour — Yard Flow";
        YardPrezi.init();
      }
      paint();
      window.addEventListener("yf-lang-change", paint);
    })();
  </script>
</body>
</html>
