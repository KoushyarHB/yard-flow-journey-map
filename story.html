<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cargo story — Yard Flow</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <header id="site-header"></header>

  <main class="wrap">
    <h1 class="page-title" data-ui="storyPageTitle"></h1>
    <div class="story-lead">
      <p class="story-lead-text" data-ui="storyIntro" data-glossary></p>
      <div class="story-lead-actions">
        <a href="prezi.html" class="story-action story-action--primary" data-ui="storyPreziLink"></a>
        <button type="button" id="picture-mode" class="story-action story-action--toggle"></button>
      </div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="lifecycle" id="lifecycle"></div>
    <div id="chapters"></div>
    <p class="footnote" data-ui="storyFoot" data-glossary></p>
  </main>

  <script src="shared/data.js"></script>
  <script src="shared/app.js"></script>
  <script>
    (function () {
      var Y = YardStory;
      Y.initLangToggle();
      Y.mountSiteHeader("story");
      Y.initPictureMode();

      function paint() {
        Y.paintUi(document);
        var d = Y.data();
        Y.renderProgress(document.getElementById("progress"), d.chapters);
        Y.renderLifecycle(document.getElementById("lifecycle"));
        var root = document.getElementById("chapters");
        root.innerHTML = "";
        d.chapters.forEach(function (ch) {
          root.appendChild(Y.renderChapter(ch));
        });
        document.title =
          Y.getLang() === "fa" ? "داستان — Yard Flow" : "Story — Yard Flow";
      }

      paint();
      window.addEventListener("yf-lang-change", paint);
    })();
  </script>
</body>
</html>
