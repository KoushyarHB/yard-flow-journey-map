<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cargo story — Yard Flow</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 data-ui="storyPageTitle"></h1>
    <nav class="pills">
      <a href="index.html" data-ui="navStart">Start</a>
      <a href="story.html" class="active" data-ui="navStory">Cargo story</a>
      <a href="roles.html" data-ui="navRoles">By role</a>
      <a href="glossary.html" data-ui="navGlossary">Glossary</a>
      <a href="models.html" data-ui="navModels">Domain model</a>
      <a href="prezi.html" data-ui="navPrezi">Flow tour</a>
    </nav>
    <div class="toolbar">
      <button type="button" id="picture-mode"></button>
    </div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button type="button" data-lang-btn="en">EN</button>
      <button type="button" data-lang-btn="fa">فا</button>
    </div>
  </header>

  <main class="wrap">
    <p style="color:var(--muted);margin-bottom:0.75rem;font-size:0.92rem" data-ui="storyIntro" data-glossary></p>
    <div class="progress" id="progress"></div>
    <div class="lifecycle" id="lifecycle"></div>
    <div id="chapters"></div>
    <p class="footnote" data-ui="storyFoot" data-glossary></p>
  </main>

  <script src="shared/data.js"></script>
  <script src="shared/app.js"></script>
  <script>
    (function () {
      var Y = YardStory;
      Y.initLangToggle();
      Y.initPictureMode();

      function paint() {
        Y.paintUi(document);
        var d = Y.data();
        Y.renderProgress(document.getElementById("progress"), d.chapters);
        Y.renderLifecycle(document.getElementById("lifecycle"));
        var root = document.getElementById("chapters");
        root.innerHTML = "";
        d.chapters.forEach(function (ch) {
          root.appendChild(Y.renderChapter(ch));
        });
        document.title =
          Y.getLang() === "fa" ? "داستان کالا — Yard Flow" : "Cargo story — Yard Flow";
      }

      paint();
      window.addEventListener("yf-lang-change", paint);
    })();
  </script>
</body>
</html>
