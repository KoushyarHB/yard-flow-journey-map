<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Domain model — Yard Flow</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <header id="site-header"></header>

  <main class="wrap models-wrap">
    <a id="glossary-back" class="glossary-back" href="index.html"></a>
    <h1 class="page-title" data-ui="modelsPageTitle"></h1>
    <div id="models-root"></div>
  </main>

  <script src="shared/domain-model.js"></script>
  <script src="shared/data.js"></script>
  <script src="shared/app.js"></script>
  <script>
    (function () {
      var Y = YardStory;
      Y.initLangToggle();
      Y.mountSiteHeader("models");
      Y.initGlossaryBack();

      function paint() {
        Y.paintUi(document);
        Y.renderDomainModels(document.getElementById("models-root"));
        document.title =
          Y.getLang() === "fa" ? "مدل — Yard Flow" : "Model — Yard Flow";
      }

      paint();
      window.addEventListener("yf-lang-change", paint);
    })();
  </script>
</body>
</html>
