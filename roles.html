<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>By role — Yard Flow</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body>
  <header id="site-header"></header>

  <main class="wrap">
    <h1 class="page-title" data-ui="rolesPageTitle"></h1>
    <p class="page-intro" data-ui="rolesIntro" data-glossary></p>
    <div id="roles"></div>
  </main>

  <script src="shared/data.js"></script>
  <script src="shared/app.js"></script>
  <script>
    (function () {
      var Y = YardStory;
      Y.initLangToggle();
      Y.mountSiteHeader("roles");

      function paint() {
        Y.paintUi(document);
        var d = Y.data();
        var root = document.getElementById("roles");
        root.innerHTML = "";
        d.roles.forEach(function (r) {
          var card = document.createElement("section");
          card.className = "role-card";
          card.id = r.id;
          var cares = Y.L(r.caresAbout);
          cares = Array.isArray(cares) ? cares.join(" · ") : cares;
          card.innerHTML =
            "<h3>" + Y.glossaryHtml(Y.L(r.title)) + "</h3>" +
            '<p class="morning">' + Y.glossaryHtml(Y.L(r.morning)) + "</p>" +
            '<div class="links"></div>' +
            '<p class="cares"><strong>' + Y.esc(Y.ui("caresAbout")) + "</strong> " + Y.glossaryHtml(cares) + "</p>";
          var links = card.querySelector(".links");
          (r.chapterRefs || []).forEach(function (ch) {
            var a = document.createElement("a");
            a.href = "story.html#" + ch.id;
            a.textContent = Y.fmt(Y.ui("chapterLink"), {
              n: ch.n,
              title: Y.L(ch.title),
            });
            links.appendChild(a);
          });
          root.appendChild(card);
        });
        document.title =
          Y.getLang() === "fa" ? "نقش‌ها — Yard Flow" : "Roles — Yard Flow";
      }

      paint();
      window.addEventListener("yf-lang-change", paint);
    })();
  </script>
</body>
</html>
